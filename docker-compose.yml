services:
  camera:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        ROS_BASE_IMAGE: arm64v8/ros:foxy-ros-base-focal
    image: ece191/camera:foxy
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix

  lidar:
    build:
      context: .
      dockerfile: Dockerfile.lidar
    image: ece191/lidar:humble
    network_mode: host
    privileged: true
    environment:
      - DISPLAY=${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
